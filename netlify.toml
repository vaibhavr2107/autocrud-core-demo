
[build]
  publish = "dist/public"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# API Routes - Route all API calls to serverless functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# GraphQL Endpoint
[[redirects]]
  from = "/graphql"
  to = "/.netlify/functions/graphql"
  status = 200

# SPA Routing - Catch all other routes and serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Serverless Functions Configuration
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# CORS Headers for API endpoints
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, PATCH, OPTIONS"

# CORS Headers for GraphQL
[[headers]]
  for = "/graphql"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "POST, OPTIONS"

# Security Headers for main site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Edge Functions (optional, for advanced features)
# [edge_functions]
#   "/api/edge-*" = { function = "edge-handler" }
